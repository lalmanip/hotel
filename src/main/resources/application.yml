server:
  port: 8090
  servlet:
    context-path: /

spring:
  application:
    name: hotel-booking-platform

  datasource:
    url: jdbc:mysql://localhost:3306/vivance_java?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    # Schema is maintained manually (or run SQL from db/migration yourself). No automatic migrations.
    enabled: false
    table: hotel_flyway_schema_history
    baseline-on-migrate: false

  jpa:
    hibernate:
      # No Hibernate DDL: create/alter/drop tables only via your own SQL / DBA process.
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        use_sql_comments: false
        # Required so the physical table name `user` is quoted in SQL (MySQL reserved word).
        globally_quoted_identifiers: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    mapper:
      accept-case-insensitive-properties: true

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437   # 256-bit hex key
  expiration-ms: 86400000   # 24 hours

# ─── Aggregator Configuration ─────────────────────────────────────────────────
hotel:
  aggregators:
    active: TBO             # comma-separated for multi: TBO,EXPEDIA
    tbo:
      base-url: https://HotelBE.tektravels.com/hotelservice.svc/rest
      timeout-seconds: 15
      # Endpoint paths (override if TBO changes them)
      book-path: /book/
      booking-detail-path: /Getbookingdetail/
      # Authentication (same credentials as TBO Flight microservice)
      auth-url: http://Sharedapi.tektravels.com/SharedData.svc/rest/Authenticate
      client-id: ApiIntegrationNew
      user-name: Abhimanyu
      password: Abhimanyu@123
      end-user-ip: 123.1.1.1
      affiliate-search-url: https://affiliate.tektravels.com/HotelAPI/Search
      affiliate-pre-book-url: https://affiliate.tektravels.com/HotelAPI/PreBook

# ─── Resilience4j ─────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      aggregator:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      aggregator:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.util.concurrent.TimeoutException
  timelimiter:
    instances:
      aggregator:
        timeoutDuration: 15s

# ─── SpringDoc / Swagger ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.vivance.hotel: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
