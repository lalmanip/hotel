name: CI/CD Pipeline (DEV only)

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

env:
  IMAGE_NAME: vivance/hotel-api

jobs:
  build-and-test:
    name: Build (skip tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven (tests skipped — no DB in CI)
        run: mvn -B clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  docker-build-push:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      secondary-tag: ${{ steps.tags.outputs.secondary }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "primary=develop" >> $GITHUB_OUTPUT
          echo "secondary=develop-$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.primary }}
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.secondary }}

  deploy-dev:
    name: Deploy to Dev
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            IMAGE_TAG=${{ needs.docker-build-push.outputs.secondary-tag }}

            echo "==> Updating Kubernetes deployment..."
            kubectl set image deployment/vivance-hotel-api \
              vivance-hotel-api=${{ env.IMAGE_NAME }}:$IMAGE_TAG

            kubectl annotate deployment vivance-hotel-api \
              kubernetes.io/change-cause="DEV deploy $IMAGE_TAG" \
              --overwrite

            echo "==> Waiting for rollout..."
            kubectl rollout status deployment/vivance-hotel-api --timeout=180s

            echo "==> Deployment complete!"
            kubectl get pods -l app=vivance-hotel-api

